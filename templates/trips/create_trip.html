{% extends 'base.html' %}
{% load crispy_forms_tags %} 

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            
            <a href="{% url 'dashboard' %}" class="text-decoration-none text-muted mb-4 d-inline-block">
                <i class="bi bi-arrow-left me-2"></i>Voltar para o Dashboard
            </a>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-0 pt-4 pb-0 px-4 px-md-5">
                    <div class="d-flex align-items-center mb-2">
                        <div class="bg-primary-subtle text-primary rounded-circle p-3 me-3">
                            <i class="bi bi-luggage fs-3"></i>
                        </div>
                        <div>
                            <h3 class="fw-bold mb-0">Nova Viagem</h3>
                            <p class="text-muted mb-0">Preencha os detalhes da sua próxima aventura.</p>
                        </div>
                    </div>
                    <hr class="mt-4 mb-0 text-muted opacity-25">
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form|crispy }}
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                            <a href="{% url 'dashboard' %}" class="btn btn-light px-4 py-2 rounded-pill fw-medium me-md-2">Cancelar</a>
                            <button class="btn btn-primary px-5 py-2 rounded-pill fw-medium shadow-sm" type="submit">
                                <i class="bi bi-check2-circle me-2"></i>Salvar Viagem
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
