{% extends 'base.html' %}

{% block content %}

<h2>
    📋 Checklist
</h2>

<h5>
    {{ trip.title }}
</h5>

<hr>

<form
    method="post"
    action="{% url 'add_checklist_item' trip.id %}"
>

    {% csrf_token %}

    {{ form }}

    <button
        class="btn btn-primary"
    >
        Adicionar
    </button>

</form>

<hr>

{% for item in items %}

<div
    class="card mb-2"
>

    <div
        class="card-body d-flex justify-content-between"
    >

        <div>

            {% if item.completed %}
                ✅
            {% else %}
                ⬜
            {% endif %}

            {{ item.title }}

        </div>

        <div>

            <a
                class="btn btn-success btn-sm"
                href="{% url 'toggle_checklist_item' item.id %}"
            >
                Alternar
            </a>

            <a
                class="btn btn-danger btn-sm"
                href="{% url 'delete_checklist_item' item.id %}"
            >
                Excluir
            </a>

        </div>

    </div>

</div>

{% empty %}

<p>
    Nenhum item cadastrado.
</p>

{% endfor %}

{% endblock %}
