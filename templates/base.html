<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>TravelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark-gradient d-md-none px-3 sticky-top">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">✈ TravelHub</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>

    <div class="d-flex">
        <aside class="sidebar offcanvas-md offcanvas-start bg-dark-gradient" tabindex="-1" id="sidebarOffcanvas">
            <div class="offcanvas-header d-md-none border-bottom border-secondary">
                <h5 class="offcanvas-title text-white fw-bold">✈ TravelHub</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column p-4">
                <div class="logo d-none d-md-block">✈ TravelHub</div>
                <p class="sidebar-subtitle d-none d-md-block">Seu centro de viagens</p>
                <hr class="border-secondary d-none d-md-block">
                
                <ul class="nav flex-column gap-2 w-100">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'dashboard' %}">
                            <i class="bi bi-house-door me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'create_trip' %}">
                            <i class="bi bi-suitcase-lg me-2"></i> Nova Viagem
                        </a>
                    </li>
                    <li class="nav-item mt-3 mb-1">
                        <span class="text-white-50 small text-uppercase fw-bold px-3">Pessoal</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'global_documents_dashboard' %}">
                            <i class="bi bi-file-person me-2"></i> Meus Documentos
                        </a>
                    </li>
                           <hr class="text-white-50 my-3">
            <li class="nav-item">
                <a class="nav-link text-danger" href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </li>
                </ul>
            </div>
        </aside>

 

        <main class="content flex-grow-1">
            <div class="container-fluid max-w-1200"> {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
