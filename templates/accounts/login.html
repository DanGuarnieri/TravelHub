<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - TravelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="bg-dark-gradient d-flex align-items-center justify-content-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex p-3 mb-3">
                                <i class="bi bi-airplane-engines fs-1"></i>
                            </div>
                            <h3 class="fw-bold text-dark mb-1">Bem-vindo de volta!</h3>
                            <p class="text-muted small">Insira suas credenciais para acessar suas viagens.</p>
                        </div>

                        {% load crispy_forms_tags %}
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}
                            
                            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-4 shadow-sm" type="submit">
                                Entrar no TravelHub
                            </button>
                        </form>

                    </div>
                    <div class="card-footer border-0 bg-light text-center py-4">
                        <p class="text-muted mb-0 small">Ainda não tem uma conta? 
                            <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Crie uma agora</a>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
