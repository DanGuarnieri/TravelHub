<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - TravelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="bg-dark-gradient d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-dark mb-1">Comece sua jornada 🌍</h3>
                            <p class="text-muted small">Crie sua conta no TravelHub e organize tudo em um só lugar.</p>
                        </div>

                        {% load crispy_forms_tags %}
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}
                            
                            <button class="btn btn-success w-100 py-3 rounded-pill fw-bold mt-4 shadow-sm" type="submit">
                                Criar Minha Conta
                            </button>
                        </form>

                    </div>
                    <div class="card-footer border-0 bg-light text-center py-4">
                        <p class="text-muted mb-0 small">Já possui uma conta? 
                            <a href="{% url 'login' %}" class="text-success fw-bold text-decoration-none">Faça login</a>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
